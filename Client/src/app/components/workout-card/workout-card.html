  <mat-card>
    <mat-card-header>
      <div class="name-date-header">
        <h2>{{ workout.name }}</h2>
        <p>{{ workout.date | relativeDate }} {{workout.startTime}}</p>
      </div>
      <button class="delete" (click)="remove()" matMiniFab color="warn">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-card-header>
    <mat-card-content>
      <div>
        <p>type: {{ workout.type }}</p>
        <p><strong>Sport: {{ workout.sport }}</strong></p>   
      </div>
      <div>
        <p><strong>Time: {{ workout.time }}m</strong></p>
        <p>Calories: {{ workout.calories }}cal</p>
        <p>intensity: {{ workout.intensity }}</p>        
      </div>
    </mat-card-content>

  </mat-card>
